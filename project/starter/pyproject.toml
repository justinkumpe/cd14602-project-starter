[tool.black]
line-length = 79
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 79

[tool.mypy]
python_version = "3.10"
exclude = ["venv", ".venv"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-markers"

[tool.coverage.run]
omit = ["venv/*", ".venv/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
