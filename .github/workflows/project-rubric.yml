name: Project Rubric

on:
  push:
    branches: [main, master]
    paths:
      - "project/starter/**"
      - ".github/workflows/project-rubric.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "project/starter/**"
      - ".github/workflows/project-rubric.yml"

defaults:
  run:
    working-directory: project/starter

jobs:
  rubric:
    name: Validate Project Rubric
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: project/starter/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Black formatting
        run: black --check .

      - name: Check import order (isort)
        run: isort --check-only .

      - name: Lint with flake8 (PEP 8)
        run: flake8 .

      - name: Type check with mypy
        run: mypy .

      - name: Run tests with coverage (>=80% required)
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=80 -q

      - name: Validate rubric documentation and structure
        run: python scripts/check_rubric.py
